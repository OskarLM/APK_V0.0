<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MIS GASTOS V0.9.1</title>
  <meta name="theme-color" content="#0b0f1a" />

  <style>
    :root{
      --primary:#d4af37;--success:#22c55e;--danger:#ef4444;--warning:#f97316;--electric-blue:#00f2ff;
      --bg:#0b0f1a;--card-bg:rgba(30,41,59,.7);--text:#f8fafc;
      --gold-gradient:linear-gradient(45deg,#bf953f,#fcf6ba,#b38728,#fbf5b7,#aa771c);
    }
    *{box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;overflow-x:hidden}

    .background-icon{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30vw;font-weight:900;
      background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.1;z-index:-1;}

    .topbar{background:rgba(30,41,59,.9);padding:20px;font-size:15px;font-weight:700;text-align:center;border-bottom:1px solid var(--primary);color:var(--primary);position:sticky;top:0;z-index:1000}

    .container{padding:20px;position:relative;z-index:1}

    .card{background:var(--card-bg);padding:16px;margin:12px 0;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,.3);position:relative;
      border-left:5px solid var(--primary);backdrop-filter:blur(8px)}
    .card b{font-size:14px;color:#fff;display:block}
    .card .meta{font-size:11px;color:var(--primary);font-weight:700;margin-bottom:4px}
    .card .monto{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:800}

    .filtros-wrapper{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;background:var(--card-bg);padding:12px;border-radius:20px;
      border:1px solid rgba(212,175,55,.3);margin-bottom:20px}
    .filtros-wrapper * label{font-size:13px;color:var(--primary);font-weight:900;margin-bottom:5px;display:inline-block}

    input,select,textarea{width:100%;padding:12px;margin:8px 0;font-size:13px;border-radius:12px;border:1px solid #334155;
      background:rgba(15,23,42,.9);color:#fff}

    .footer-controles{position:fixed;bottom:0;left:0;width:100%;background:rgba(15,23,42,.98);padding:15px 20px calc(35px);
      border-top:2px solid var(--primary);z-index:1100;border-radius:24px 24px 0 0}
    .footer-actions{display:flex;gap:8px;margin-bottom:20px}
    .btn-small{padding:10px;flex:1;font-size:10px;background:#222;color:var(--primary);border-radius:8px;border:1px solid var(--primary);
      font-weight:700}
    .btn-reset{background:#450a0a;color:var(--danger);border-color:var(--danger);flex:.4}

    .footer-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%}
    .plus{background:var(--gold-gradient);width:65px;height:65px;border-radius:50%;font-size:35px;color:#000;display:flex;
      align-items:center;justify-content:center;border:none;font-weight:700;cursor:pointer}
    #balance{font-size:24px;font-weight:900;padding:10px 15px;background:#000;border-radius:14px;border:1px solid var(--primary);
      text-align:center;justify-self:end;min-width:110px}

    .btn-casa-premium{position:fixed;bottom:35px;left:27%;width:65px;height:65px;background:var(--gold-gradient);border-radius:50%;
      display:flex;align-items:center;justify-content:center;border:none;z-index:1200;box-shadow:0 4px 15px rgba(0,0,0,.5);cursor:pointer}
    .btn-casa-premium svg{fill:black;width:32px;height:32px}
    .btn-casa-premium.apagado{filter:grayscale(1) brightness(.4);transform:scale(.85)}

    .hidden{display:none!important}
  </style>
</head>
<body>

  <div class="background-icon">O&J</div>

  <!-- APP SIN PIN -->
  <div id="movimientos" data-permiso="OK" data-modo="lista">
